name: Governed PR Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  # The reusable check reads repository contents for workflow execution context.
  contents: read
  # It reads pull request metadata and changed-file lists for report-only validation.
  pull-requests: read

jobs:
  governed-pr-check:
    # Pinned to hummbl-dev/.github main after the self-hosted runner fix.
    uses: hummbl-dev/.github/.github/workflows/governed-pr-check.yml@2d38e93
    with:
      fail-on-findings: false
